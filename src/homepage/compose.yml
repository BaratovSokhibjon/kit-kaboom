services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    volumes:
      - ../../volumes/storage/homepage/config:/app/config # Make sure your local config directory exists
      - ../../volumes/storage/homepage:/app/logs # (optional) For logging, see alternative methods
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations, see alternative methods
    env_file:
      - .env

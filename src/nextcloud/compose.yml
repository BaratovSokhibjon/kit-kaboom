services:
  nextcloud-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER:-nextcloud_admin}
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD:-NEXTCLOUD_DB_PASSWORD123}"
      POSTGRES_DB: ${NEXTCLOUD_DB_DATABASE:-nextcloud_db}
    volumes:
      - "${NEXTCLOUD_DB_DATA_LOCATION:-../../volumes/storage/nextcloud-db/data}:/var/lib/postgresql/data"
    networks:
      - nextcloud
    healthcheck:
      test: "pg_isready -U ${NEXTCLOUD_DB_USER:-nextcloud_admin} -d ${NEXTCLOUD_DB_DATABASE:-nextcloud_db}"
      interval: 30s
      timeout: 20s
      retries: 3

  nextcloud-redis:
    image: redis:8.2.2-bookworm
    restart: unless-stopped
    environment:
      TERM: ${TERM:-xterm}
    volumes:
      - "${NEXTCLOUD_REDIS_DATA_LOCATION:-../../volumes/storage/nextcloud-redis/data}:/data"
    networks:
      - nextcloud
    command: ["--port", "${NEXTCLOUD_REDIS_PORT:-6380}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${NEXTCLOUD_REDIS_PORT:-6380}", "ping"]
      interval: 10s
      timeout: 30s
      retries: 3

  nextcloud:
    image: nextcloud:32-apache
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    environment:
      TZ: ${TZ:-UTC}

      # Database
      POSTGRES_HOST: ${NEXTCLOUD_DB_HOST:-nextcloud-db}
      POSTGRES_DB: ${NEXTCLOUD_DB_DATABASE:-nextcloud_db}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER:-nextcloud_admin}
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD:-NEXTCLOUD_DB_PASSWORD123}"

      # Redis
      REDIS_HOST: ${NEXTCLOUD_REDIS_HOST:-nextcloud-redis}
      REDIS_HOST_PORT: ${NEXTCLOUD_REDIS_PORT:-6380}

      # Admin
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: "${NEXTCLOUD_ADMIN_PASSWORD:-NEXTCLOUD_ADMIN_PASSWORD123}"

      # Trusted domains (space-separated)
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS:-localhost}

      # Upload limits
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_UPLOAD_LIMIT: ${PHP_UPLOAD_LIMIT:-512M}

      # Reverse proxy
      VIRTUAL_HOST: ${VIRTUAL_HOST:-}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST:-}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
      OVERWRITEHOST: ${OVERWRITEHOST:-}
      OVERWRITEPROTOCOL: ${OVERWRITEPROTOCOL:-https}

    env_file:
      - path: .env
        required: false
    volumes:
      - "${NEXTCLOUD_DATA_LOCATION:-../../volumes/storage/nextcloud/data}:/var/www/html"
    networks:
      - nextcloud
    ports:
      - "${NEXTCLOUD_PORT:-25003}:80"


networks:
  nextcloud:
